openapi: 3.0.3
info:
  description: API for managing library books
  title: Library Management API
  version: 1.0.0
servers:
- description: Development server
  url: http://localhost:5000
paths:
  /books:
    get:
      operationId: get_books
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/Book"
                type: array
          description: List of books
      summary: Get all books
      tags:
      - Books
      x-openapi-router-controller: openapi_server.controllers.books_controller
    post:
      operationId: create_book
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
          description: Book created successfully
        "400":
          description: Invalid input
      summary: Create a new book
      tags:
      - Books
      x-openapi-router-controller: openapi_server.controllers.books_controller
  /books/{id}:
    delete:
      operationId: delete_book
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          type: integer
        style: simple
      responses:
        "204":
          description: Book deleted successfully
        "404":
          description: Book not found
      summary: Delete book by ID
      tags:
      - Books
      x-openapi-router-controller: openapi_server.controllers.books_controller
    get:
      operationId: get_book_by_id
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          type: integer
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
          description: Book details
        "404":
          description: Book not found
      summary: Get book by ID
      tags:
      - Books
      x-openapi-router-controller: openapi_server.controllers.books_controller
    put:
      operationId: update_book
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          type: integer
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBookRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
          description: Book updated successfully
        "404":
          description: Book not found
      summary: Update book by ID
      tags:
      - Books
      x-openapi-router-controller: openapi_server.controllers.books_controller
components:
  schemas:
    Book:
      example:
        year: 2008
        author: Robert C. Martin
        isbn: 978-0132350884
        available: true
        id: 1
        title: Clean Code
      properties:
        id:
          example: 1
          title: id
          type: integer
        title:
          example: Clean Code
          title: title
          type: string
        author:
          example: Robert C. Martin
          title: author
          type: string
        isbn:
          example: 978-0132350884
          title: isbn
          type: string
        year:
          example: 2008
          title: year
          type: integer
        available:
          example: true
          title: available
          type: boolean
      required:
      - author
      - id
      - isbn
      - title
      title: Book
      type: object
    CreateBookRequest:
      example:
        year: 2008
        author: Robert C. Martin
        isbn: 978-0132350884
        available: true
        title: Clean Code
      properties:
        title:
          example: Clean Code
          title: title
          type: string
        author:
          example: Robert C. Martin
          title: author
          type: string
        isbn:
          example: 978-0132350884
          title: isbn
          type: string
        year:
          example: 2008
          title: year
          type: integer
        available:
          example: true
          title: available
          type: boolean
      required:
      - author
      - isbn
      - title
      title: CreateBookRequest
      type: object
    UpdateBookRequest:
      example:
        year: 0
        author: author
        isbn: isbn
        available: true
        title: title
      properties:
        title:
          title: title
          type: string
        author:
          title: author
          type: string
        isbn:
          title: isbn
          type: string
        year:
          title: year
          type: integer
        available:
          title: available
          type: boolean
      title: UpdateBookRequest
      type: object
