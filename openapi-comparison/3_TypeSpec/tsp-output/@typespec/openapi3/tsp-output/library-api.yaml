openapi: 3.0.0
info:
  title: Library Management API
  version: 1.0.0
tags: []
paths:
  /books:
    get:
      operationId: Books_list
      description: Get all books
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Book'
    post:
      operationId: Books_create
      description: Create a new book
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBookRequest'
  /books/{id}:
    get:
      operationId: Books_getById
      description: Get a book by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'
    put:
      operationId: Books_update
      description: Update a book
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBookRequest'
    delete:
      operationId: Books_delete
      description: Delete a book
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int32
      responses:
        '204':
          description: 'There is no content to send for this request, but the headers may be useful. '
components:
  schemas:
    Book:
      type: object
      description: Book information
      required:
        - id
        - title
        - author
        - isbn
      properties:
        id:
          type: integer
          format: int32
          description: Unique book ID
        title:
          type: string
          description: Book title
        author:
          type: string
          description: Book author
        isbn:
          type: string
          description: ISBN number
        year:
          type: integer
          format: int32
          description: Publication year
          minimum: 1000
          maximum: 2100
        available:
          type: boolean
          description: Whether the book is available
          default: true
    CreateBookRequest:
      type: object
      description: Request to create a new book
      required:
        - title
        - author
        - isbn
      properties:
        title:
          type: string
          description: Book title
        author:
          type: string
          description: Book author
        isbn:
          type: string
          description: ISBN number
        year:
          type: integer
          format: int32
          description: Publication year
          minimum: 1000
          maximum: 2100
        available:
          type: boolean
          description: Whether the book is available
          default: true
    UpdateBookRequest:
      type: object
      description: Request to update a book
      properties:
        title:
          type: string
          description: Book title
        author:
          type: string
          description: Book author
        isbn:
          type: string
          description: ISBN number
        year:
          type: integer
          format: int32
          description: Publication year
          minimum: 1000
          maximum: 2100
        available:
          type: boolean
          description: Whether the book is available
servers:
  - url: http://localhost:5000
    description: Development server
    variables: {}
